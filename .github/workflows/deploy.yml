name: Build and Deploy

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - locale: nl
          - locale: en

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: matrix.locale == 'nl'
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_LOCALE: ${{ matrix.locale }}

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.locale }}
          path: out/
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - locale: nl
            rclone_config_secret: RCLONE_CONFIG_NL
          - locale: en
            rclone_config_secret: RCLONE_CONFIG_EN

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ matrix.locale }}
          path: out/

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets[matrix.rclone_config_secret] }}

      - name: Deploy via FTP
        run: |
          rclone sync out/ ftp:/ \
            --transfers 16 \
            --delete-after